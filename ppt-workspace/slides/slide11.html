<!DOCTYPE html><html><head><style>

html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  font-family: Arial, sans-serif;
  display: flex; flex-direction: column;
  overflow: hidden;
}

body { background: #FFFFFF; }
</style></head><body>
  <div style="background:#0F172A; padding:16pt 36pt;">
    <p style="color:rgba(255,255,255,0.5); font-size:10pt; margin:0 0 4pt 0;">04 主要功能介绍</p>
    <p style="color:#fff; font-size:22pt; font-weight:bold; margin:0;">测试套件与执行监控</p>
  </div>
  <div style="display:flex; padding:16pt 36pt; gap:16pt;">
    <div style="width:320pt;">
      <p style="color:#1E293B; font-size:14pt; font-weight:bold; margin:0 0 10pt 0;">测试套件管理</p>
      <div style="display:flex; flex-direction:column; gap:8pt;">
        <div style="background:#F1F5F9; border-radius:6pt; padding:10pt;">
          <p style="color:#1E293B; font-size:11pt; font-weight:bold; margin:0;">套件组织</p>
          <p style="color:#64748B; font-size:9pt; margin:2pt 0 0 0;">将多个测试用例组织为可执行套件,支持排序和启用/禁用</p>
        </div>
        <div style="background:#F1F5F9; border-radius:6pt; padding:10pt;">
          <p style="color:#1E293B; font-size:11pt; font-weight:bold; margin:0;">环境配置</p>
          <p style="color:#64748B; font-size:9pt; margin:2pt 0 0 0;">BaseURL / 认证Token / Session / 自定义Header</p>
        </div>
        <div style="background:#F1F5F9; border-radius:6pt; padding:10pt;">
          <p style="color:#1E293B; font-size:11pt; font-weight:bold; margin:0;">定时调度</p>
          <p style="color:#64748B; font-size:9pt; margin:2pt 0 0 0;">支持 Cron 表达式定时执行,实现持续回归测试</p>
        </div>
      </div>
    </div>
    <div style="width:320pt;">
      <p style="color:#1E293B; font-size:14pt; font-weight:bold; margin:0 0 10pt 0;">执行监控</p>
      <div style="display:flex; flex-direction:column; gap:8pt;">
        <div style="background:#FEF2F2; border-radius:6pt; padding:10pt; border-left:3pt solid #0EA5E9;">
          <p style="color:#1E293B; font-size:11pt; font-weight:bold; margin:0;">实时日志流</p>
          <p style="color:#64748B; font-size:9pt; margin:2pt 0 0 0;">SSE 实时推送,逐条展示步骤执行详情</p>
        </div>
        <div style="background:#FEF2F2; border-radius:6pt; padding:10pt; border-left:3pt solid #2563EB;">
          <p style="color:#1E293B; font-size:11pt; font-weight:bold; margin:0;">执行控制</p>
          <p style="color:#64748B; font-size:9pt; margin:2pt 0 0 0;">启动 / 停止 / 重试,灵活控制执行过程</p>
        </div>
        <div style="background:#FEF2F2; border-radius:6pt; padding:10pt; border-left:3pt solid #10B981;">
          <p style="color:#1E293B; font-size:11pt; font-weight:bold; margin:0;">Python 执行引擎</p>
          <p style="color:#64748B; font-size:9pt; margin:2pt 0 0 0;">FastAPI 独立服务,变量管理器 + 调度器</p>
        </div>
      </div>
    </div>
  </div>
  <div style="position:absolute; bottom:8pt; right:20pt;">
    <p style="color:#64748B; font-size:9pt; margin:0;">11 / 15</p>
  </div>
</body></html>
