<!DOCTYPE html><html><head><style>

html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  font-family: Arial, sans-serif;
  display: flex; flex-direction: column;
  overflow: hidden;
}

body { background: #FFFFFF; }
</style></head><body>
  <div style="background:#0F172A; padding:16pt 36pt;">
    <p style="color:rgba(255,255,255,0.5); font-size:10pt; margin:0 0 4pt 0;">04 主要功能介绍</p>
    <p style="color:#fff; font-size:22pt; font-weight:bold; margin:0;">API 采集 - 多模式接口录制</p>
  </div>
  <div style="padding:20pt 42pt;">
    
    <div style="display:flex; margin:0 0 12pt 0;">
      <div style="background:#2563EB; width:5pt; border-radius:3pt; margin:0 10pt 0 0;"></div>
      <div style="width:620pt;">
        <p style="color:#1E293B; font-size:13pt; font-weight:bold; margin:0 0 3pt 0;">浏览器录制</p>
        <p style="color:#64748B; font-size:10pt; margin:0; line-height:1.3;">基于 Playwright Chromium 内核,启动浏览器实时捕获API请求,支持暂停/恢复/SSE流式推送</p>
      </div>
    </div>
  
    <div style="display:flex; margin:0 0 12pt 0;">
      <div style="background:#0D9488; width:5pt; border-radius:3pt; margin:0 10pt 0 0;"></div>
      <div style="width:620pt;">
        <p style="color:#1E293B; font-size:13pt; font-weight:bold; margin:0 0 3pt 0;">代理录制</p>
        <p style="color:#64748B; font-size:10pt; margin:0; line-height:1.3;">HTTP代理模式,配置代理地址后自动捕获经过代理的所有API请求</p>
      </div>
    </div>
  
    <div style="display:flex; margin:0 0 12pt 0;">
      <div style="background:#10B981; width:5pt; border-radius:3pt; margin:0 10pt 0 0;"></div>
      <div style="width:620pt;">
        <p style="color:#1E293B; font-size:13pt; font-weight:bold; margin:0 0 3pt 0;">Mitmproxy录制</p>
        <p style="color:#64748B; font-size:10pt; margin:0; line-height:1.3;">中间人代理方式,支持 HTTPS 解密和录制,适用于移动端测试场景</p>
      </div>
    </div>
  
    <div style="display:flex; margin:0 0 12pt 0;">
      <div style="background:#F59E0B; width:5pt; border-radius:3pt; margin:0 10pt 0 0;"></div>
      <div style="width:620pt;">
        <p style="color:#1E293B; font-size:13pt; font-weight:bold; margin:0 0 3pt 0;">HAR文件导入</p>
        <p style="color:#64748B; font-size:10pt; margin:0; line-height:1.3;">支持从浏览器开发者工具导出的 HAR 文件批量导入,自动解析和路径参数化</p>
      </div>
    </div>
  
    <div style="background:#F1F5F9; border-radius:8pt; padding:12pt 16pt; margin:6pt 0 0 0;">
      <p style="color:#1E293B; font-size:10pt; margin:0;"><b>核心能力:</b> 智能去重检测 | Header过滤配置 | 路径参数自动识别 | 批量保存至API仓库 | 冲突解决策略</p>
    </div>
  </div>
  <div style="position:absolute; bottom:8pt; right:20pt;">
    <p style="color:#64748B; font-size:9pt; margin:0;">7 / 15</p>
  </div>
</body></html>
